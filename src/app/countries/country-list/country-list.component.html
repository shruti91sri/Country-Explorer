<div class="country-list-page">
  <div class="filters-bar">
    <form [formGroup]="filterForm">
      <div class="filter-row">
        <div class="filter-item">
          <app-p-input-text
            formControlName="search"
            placeholder="Search countries...">
          </app-p-input-text>
        </div>

        <div class="filter-item">
          <app-p-dropdown
            [options]="regions"
            formControlName="region"
            placeholder="All Regions"
            [showClear]="true"
            optionLabel="label"
            optionValue="value"
          ></app-p-dropdown>
        </div>

        <div class="filter-item">
          <app-p-dropdown
            [options]="sortOptions"
            formControlName="sortBy"
            optionLabel="label"
            optionValue="value"
          ></app-p-dropdown>
        </div>

        <div class="filter-item">
          <button class="clear-btn" (click)="clearFilters()">Clear Filters</button>
        </div>
      </div>
    </form>
  </div>

  <div class="results-info">
    <span>{{ filteredCountries().length }} countries found</span>
  </div>

  @if (error(); as errorMessage) {
    <div class="error">
      <p>{{ errorMessage }}</p>
    </div>
  } @else if (loading()) {
    <div class="loading">
      <p>Loading countries...</p>
    </div>
  } @else {
    <div class="country-grid">
      @for (country of filteredCountries(); track country.cca3) {
        <app-country-card [country]="country"></app-country-card>
      }
    </div>
  }
</div>
